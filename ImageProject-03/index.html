<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"> </script>
    <script>
      AFRAME.registerComponent("fix-model-materials", {
        init: function () {
          this.el.addEventListener("model-loaded", () => {
            const obj = this.el.getObject3D("mesh");
            if (!obj) return;

            obj.traverse((node) => {
              if (node.isMesh && node.material) {
                if (Array.isArray(node.material)) {
                  node.material.forEach((mat) => {
                    mat.transparent = false;
                    mat.opacity = 1;
                    mat.alphaTest = 0;
                    mat.depthWrite = true;
                    mat.depthTest = true;
                    mat.side = THREE.FrontSide;
                    mat.needsUpdate = true;
                  });
                } else {
                  node.material.transparent = false;
                  node.material.opacity = 1;
                  node.material.alphaTest = 0;
                  node.material.depthWrite = true;
                  node.material.depthTest = true;
                  node.material.side = THREE.FrontSide;
                  node.material.needsUpdate = true;
                }
              }
            });
          });
        },
      });

      AFRAME.registerComponent("activate-on-gaze", {
        schema: {
          target: { type: "selector" },
        },
        init: function () {
          this.isOn = false;
          this.timers = [];
          this.glowOriginals = [];
          this.handleEnter = this.handleEnter.bind(this);
          this.handleLeave = this.handleLeave.bind(this);

          this.el.addEventListener("mouseenter", this.handleEnter);
          this.el.addEventListener("mouseleave", this.handleLeave);

          this.targetEl = this.data.target || this.el;

          // Cache original materials for reliable reset.
          const glowTargets = this.targetEl.querySelectorAll("[data-glow]");
          glowTargets.forEach((t) => {
            const mat = t.getAttribute("material") || {};
            this.glowOriginals.push({
              el: t,
              color: t.getAttribute("color") || mat.color || "#1a1620",
              emissive: mat.emissive || "#000000",
              emissiveIntensity: mat.emissiveIntensity ?? 0,
              opacity: mat.opacity ?? 1,
              transparent: mat.transparent ?? false,
              metalness: mat.metalness,
              roughness: mat.roughness,
              shader: mat.shader,
            });
          });
        },
        remove: function () {
          this.clearTimers();
        },
        clearTimers: function () {
          this.timers.forEach((t) => clearTimeout(t));
          this.timers.length = 0;
        },
        handleEnter: function () {
          if (this.isOn) return;
          this.isOn = true;
          this.clearTimers();

          const glowTargets = this.targetEl.querySelectorAll("[data-glow]");
          glowTargets.forEach((t) => {
            // Smooth fade into bright off-white glow.
            t.setAttribute("material", "shader: standard; metalness: 0.1; roughness: 0.65;");
            t.setAttribute("animation__toWhite", "property: material.color; to: #f7f4ea; dur: 2250; easing: easeInOutSine;");
            t.setAttribute("animation__toEmissive", "property: material.emissiveIntensity; to: 2.8; dur: 2250; easing: easeInOutSine;");
            t.setAttribute("material", "transparent: true; opacity: 1;");
            t.setAttribute("animation__toOpacity", "property: material.opacity; to: 0.8; dur: 2250; easing: easeInOutSine;");
            t.setAttribute("material", "emissive: #f7f4ea; emissiveIntensity: 0;");
          });

          const glowShell = this.targetEl.querySelector("#obeliskGlowShell");
          if (glowShell) {
            glowShell.setAttribute("visible", true);
            glowShell.setAttribute("animation__fadeIn", "property: material.opacity; to: 0.38; dur: 2250; easing: easeInOutSine;");
            glowShell.setAttribute("animation__grow", "property: scale; to: 1.35 1.35 1.35; dur: 3000; easing: easeOutCubic;");
          }

          const topLight = this.targetEl.querySelector("#obeliskTopLight");
          if (topLight) {
            topLight.setAttribute("animation__lightOn", "property: light.intensity; to: 1.3; dur: 2250; easing: easeInOutSine;");
          }

          const orbs = this.targetEl.querySelector("#obeliskOrbs");
          if (orbs) {
            orbs.setAttribute("visible", false);
          }

          const beam = this.targetEl.querySelector("#obeliskBeam");
          if (beam) {
            beam.setAttribute("visible", true);
            beam.setAttribute("scale", "1 0 1");
            beam.setAttribute("material", "opacity: 0;");
            beam.setAttribute("position", "0 8.9 0");

            this.timers.push(
              setTimeout(() => {
                if (!this.isOn) return;
                beam.setAttribute("animation__beamGrow", "property: scale; to: 1 1 1; dur: 500; easing: easeOutCubic;");
                beam.setAttribute("animation__beamRise", "property: position; to: 0 28 0; dur: 500; easing: easeOutCubic;");
                beam.setAttribute("animation__beamFade", "property: material.opacity; to: 1; dur: 350; easing: easeOutCubic;");

                const orbs = this.targetEl.querySelector("#obeliskOrbs");
                if (orbs) {
                  orbs.removeAttribute("animation__orbsOut");
                  orbs.removeAttribute("animation__orbsIn");
                  orbs.setAttribute("scale", "0.6 0.6 0.6");
                  orbs.setAttribute("visible", true);
                  orbs.setAttribute("animation__orbsIn", "property: scale; to: 1 1 1; dur: 700; easing: easeOutCubic;");
                }
              }, 2625)
            );
          }
        },
        handleLeave: function () {
          if (!this.isOn) return;
          this.isOn = false;
          this.clearTimers();

          const glowTargets = this.targetEl.querySelectorAll("[data-glow]");
          glowTargets.forEach((t) => {
            t.removeAttribute("animation__toWhite");
            t.removeAttribute("animation__toEmissive");
            t.removeAttribute("animation__toOpacity");
            t.setAttribute("animation__fromWhite", "property: material.color; to: #1a1620; dur: 1625; easing: easeInOutSine;");
            t.setAttribute("animation__emissiveOff", "property: material.emissiveIntensity; to: 0; dur: 1625; easing: easeInOutSine;");
            t.setAttribute("animation__opacityBack", "property: material.opacity; to: 1; dur: 900; easing: easeInOutSine;");
          });

          this.timers.push(
            setTimeout(() => {
              if (this.isOn) return;
              this.glowOriginals.forEach((o) => {
                o.el.removeAttribute("animation__fromWhite");
                o.el.removeAttribute("animation__emissiveOff");
                o.el.removeAttribute("animation__opacityBack");

                o.el.setAttribute("color", o.color);
                o.el.setAttribute(
                  "material",
                  `shader: ${o.shader || "standard"}; color: ${o.color}; emissive: ${o.emissive || "#000000"}; emissiveIntensity: ${o.emissiveIntensity || 0}; transparent: ${o.transparent ? "true" : "false"}; opacity: ${o.opacity ?? 1}; metalness: ${o.metalness ?? 0.1}; roughness: ${o.roughness ?? 0.65};`
                );
              });
            }, 1700)
          );

          const glowShell = this.targetEl.querySelector("#obeliskGlowShell");
          if (glowShell) {
            glowShell.removeAttribute("animation__fadeIn");
            glowShell.removeAttribute("animation__grow");
            glowShell.setAttribute("animation__fadeOut", "property: material.opacity; to: 0; dur: 1625; easing: easeInOutSine;");
            this.timers.push(setTimeout(() => glowShell.setAttribute("visible", false), 1700));
          }

          const beam = this.targetEl.querySelector("#obeliskBeam");
          if (beam) {
            beam.removeAttribute("animation__beamGrow");
            beam.removeAttribute("animation__beamRise");
            beam.removeAttribute("animation__beamFade");
            beam.setAttribute("animation__beamOut", "property: material.opacity; to: 0; dur: 1125; easing: easeInOutSine;");
            beam.setAttribute("animation__beamShrink", "property: scale; to: 1 0 1; dur: 1125; easing: easeInOutSine;");
            beam.setAttribute("animation__beamFall", "property: position; to: 0 8.9 0; dur: 1125; easing: easeInOutSine;");
            this.timers.push(setTimeout(() => beam.setAttribute("visible", false), 1200));
          }

          const orbs = this.targetEl.querySelector("#obeliskOrbs");
          if (orbs) {
            orbs.removeAttribute("animation__orbsIn");
            orbs.setAttribute("animation__orbsOut", "property: scale; to: 0.6 0.6 0.6; dur: 1250; easing: easeInOutSine;");
            this.timers.push(setTimeout(() => orbs.setAttribute("visible", false), 1300));
          }

          const topLight = this.targetEl.querySelector("#obeliskTopLight");
          if (topLight) {
            topLight.setAttribute("animation__lightOff", "property: light.intensity; to: 0; dur: 1625; easing: easeInOutSine;");
          }
        },
      });
    </script>
  </head>
