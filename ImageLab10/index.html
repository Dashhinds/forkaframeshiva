<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      <!-- Sky -->
      <a-sky src="sand2.png"></a-sky>

      <!-- Ground -->
      <a-plane
        position="0 0 -6"
        rotation="-90 0 0"
        width="30"
        height="30"
        color="#cfa86a">
      </a-plane>

      <!-- Ice cream cone -->
      <a-cone
      position="-4 0.8 -5"
      radius-bottom="0.45"
      radius-top="0.08"
      height="1.4"
      rotation="0 0 180"
      color="#c68b59">
      </a-cone>

      <a-sphere
      position="-4 1.8 -5"
      radius="0.5"
      color="#f7a6d0">
      </a-sphere>

      <!-- Beach umbrella -->
      <a-cylinder
      position="4 1.3 -6"
      radius="0.06"
      height="2.6"
      color="#8b5a2b">
      </a-cylinder>

      <a-cone
      position="4 2.9 -6"
      radius-bottom="1.5"
      radius-top="0.05"
      height="1"
      rotation="0 0 0"
      color="#d84f8d">
      </a-cone>

      <!-- Sandcastle -->
      <a-box
        position="0 0.6 -9"
        width="2.8"
        height="1.2"
        depth="2.2"
        color="#d8b273">
      </a-box>

      <a-cylinder
        position="-1 1.1 -8.2"
        radius="0.28"
        height="1"
        color="#d8b273">
      </a-cylinder>

      <a-cylinder
        position="1 1.1 -8.2"
        radius="0.28"
        height="1"
        color="#d8b273">
      </a-cylinder>

      <a-cylinder
        position="-1 1.1 -9.8"
        radius="0.28"
        height="1"
        color="#d8b273">
      </a-cylinder>

      <a-cylinder
        position="1 1.1 -9.8"
        radius="0.28"
        height="1"
        color="#d8b273">
      </a-cylinder>

      <!-- Flags -->
      <a-box
        position="-1 1.65 -8.2"
        width="0.03"
        height="0.35"
        depth="0.03"
        color="#6b4f2a">
      </a-box>

      <a-box
        position="-0.88 1.72 -8.2"
        width="0.18"
        height="0.1"
        depth="0.02"
        color="#ffd54f">
      </a-box>

      <a-box
        position="1 1.65 -9.8"
        width="0.03"
        height="0.35"
        depth="0.03"
        color="#6b4f2a">
      </a-box>

      <a-box
        position="1.12 1.72 -9.8"
        width="0.18"
        height="0.1"
        depth="0.02"
        color="#6ec6ff">
      </a-box>

      <!-- Beach ball -->
      <a-sphere
        position="1.5 0.4 -6"
        radius="0.4"
        color="#ffffff">
      </a-sphere>

      <!-- Camera -->
      <a-camera position="0 1.6 3"></a-camera>
    </a-scene>
  </body>
</html>
