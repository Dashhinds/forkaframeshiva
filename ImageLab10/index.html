<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      <!-- Sky -->
      <a-sky src="sand2.png"></a-sky>

      <!-- Ground -->
      <a-plane
        position="0 0 -6"
        rotation="-90 0 0"
        width="30"
        height="30"
        color="#cfa86a">
      </a-plane>

      <!-- Ice cream cone (foreground, left) -->
      <a-cone
        position="-3 1 -4"
        radius-bottom="0.45"
        radius-top="0.08"
        height="1.4"
        color="#c68b59">
      </a-cone>

      <a-sphere
        position="-3 2.05 -4"
        radius="0.45"
        color="#ff9ecf">
      </a-sphere>

      <!-- Beach umbrella (right side) -->
      <a-cylinder
        position="4 1.5 -6"
        radius="0.06"
        height="3"
        color="#8b5a2b">
      </a-cylinder>

      <a-cone
        position="4 3.1 -6"
        radius-bottom="1.3"
        radius-top="0.08"
        height="1"
        color="#ff5fa2"
        rotation="180 0 0">
      </a-cone>

      <!-- Sandcastle (center/background) -->
      <a-box
        position="0 0.75 -10"
        width="3"
        height="1.5"
        depth="2.5"
        color="#d8b273">
      </a-box>

      <a-cylinder
        position="-1 1.4 -9"
        radius="0.35"
        height="1.3"
        color="#d8b273">
      </a-cylinder>

      <a-cylinder
        position="1 1.4 -9"
        radius="0.35"
        height="1.3"
        color="#d8b273">
      </a-cylinder>

      <a-cylinder
        position="-1 1.4 -11"
        radius="0.35"
        height="1.3"
        color="#d8b273">
      </a-cylinder>

      <a-cylinder
        position="1 1.4 -11"
        radius="0.35"
        height="1.3"
        color="#d8b273">
      </a-cylinder>

      <!-- Simple flags -->
      <a-box
        position="-1 2.15 -9"
        width="0.05"
        height="0.5"
        depth="0.05"
        color="#5c4033">
      </a-box>

      <a-box
        position="-0.85 2.25 -9"
        width="0.25"
        height="0.15"
        depth="0.02"
        color="#ffcc4d">
      </a-box>

      <a-box
        position="1 2.15 -11"
        width="0.05"
        height="0.5"
        depth="0.05"
        color="#5c4033">
      </a-box>

      <a-box
        position="1.15 2.25 -11"
        width="0.25"
        height="0.15"
        depth="0.02"
        color="#6ec6ff">
      </a-box>

      <!-- Extra beach ball for more summer vibe -->
      <a-sphere
        position="1.5 0.4 -5"
        radius="0.4"
        color="#ffffff">
      </a-sphere>

      <!-- Camera -->
      <a-camera position="0 1.6 3"></a-camera>
    </a-scene>
  </body>
</html>
